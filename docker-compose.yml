services:
  gateway:
    build: .
    ports:
      - "8001:8000"
    extra_hosts:
      - "carrental.test:host-gateway"
    environment:
      - GATEWAY_ENV=production
      - GATEWAY_DEBUG=true
      - GATEWAY_API_KEYS=${GATEWAY_API_KEYS}
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - LARAVEL_BASE_URL=${LARAVEL_BASE_URL}
      - LARAVEL_API_TOKEN=${LARAVEL_API_TOKEN}
      - GREENMOTION_API_URL=${GREENMOTION_API_URL}
      - GREENMOTION_USERNAME=${GREENMOTION_USERNAME}
      - GREENMOTION_PASSWORD=${GREENMOTION_PASSWORD}
      - USAVE_API_URL=${USAVE_API_URL}
      - USAVE_USERNAME=${USAVE_USERNAME}
      - USAVE_PASSWORD=${USAVE_PASSWORD}
      - RENTEON_API_URL=${RENTEON_API_URL}
      - RENTEON_USERNAME=${RENTEON_USERNAME}
      - RENTEON_PASSWORD=${RENTEON_PASSWORD}
      - RENTEON_ALLOWED_PROVIDERS=${RENTEON_ALLOWED_PROVIDERS}
      - FAVRICA_API_URL=${FAVRICA_API_URL}
      - FAVRICA_TOKEN=${FAVRICA_TOKEN}
      - FAVRICA_USERNAME=${FAVRICA_USERNAME}
      - FAVRICA_PASSWORD=${FAVRICA_PASSWORD}
      - XDRIVE_API_URL=${XDRIVE_API_URL}
      - XDRIVE_TOKEN=${XDRIVE_TOKEN}
      - XDRIVE_USERNAME=${XDRIVE_USERNAME}
      - XDRIVE_PASSWORD=${XDRIVE_PASSWORD}
      - ADOBE_API_URL=${ADOBE_API_URL}
      - ADOBE_USERNAME=${ADOBE_USERNAME}
      - ADOBE_PASSWORD=${ADOBE_PASSWORD}
      - OKMOBILITY_API_URL=${OKMOBILITY_API_URL}
      - OKMOBILITY_CUSTOMER_CODE=${OKMOBILITY_CUSTOMER_CODE}
      - OKMOBILITY_COMPANY_CODE=${OKMOBILITY_COMPANY_CODE}
      - LOCAUTO_API_URL=${LOCAUTO_API_URL}
      - LOCAUTO_USERNAME=${LOCAUTO_USERNAME}
      - LOCAUTO_PASSWORD=${LOCAUTO_PASSWORD}
      - WHEELSYS_API_URL=${WHEELSYS_API_URL}
      - WHEELSYS_ACCOUNT_NO=${WHEELSYS_ACCOUNT_NO}
      - WHEELSYS_LINK_CODE=${WHEELSYS_LINK_CODE}
      - WHEELSYS_AGENT_CODE=${WHEELSYS_AGENT_CODE}
      - SURPRICE_API_URL=${SURPRICE_API_URL}
      - SURPRICE_API_KEY=${SURPRICE_API_KEY}
      - SURPRICE_RATE_CODE=${SURPRICE_RATE_CODE}
      - SICILYBYCAR_API_URL=${SICILYBYCAR_API_URL}
      - SICILYBYCAR_ACCOUNT_CODE=${SICILYBYCAR_ACCOUNT_CODE}
      - SICILYBYCAR_API_KEY=${SICILYBYCAR_API_KEY}
      - RECORDGO_API_URL=${RECORDGO_API_URL}
      - RECORDGO_AUTH_URL=${RECORDGO_AUTH_URL}
      - RECORDGO_CLIENT_ID=${RECORDGO_CLIENT_ID}
      - RECORDGO_CLIENT_SECRET=${RECORDGO_CLIENT_SECRET}
      - RECORDGO_SUBSCRIPTION_KEY=${RECORDGO_SUBSCRIPTION_KEY}
      - RECORDGO_PARTNER_USER=${RECORDGO_PARTNER_USER}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Location sync cron — refreshes unified_locations.json every 6 hours
  location-sync:
    build: .
    entrypoint: ["sh", "-c", "while true; do python -m app.scripts.refresh_locations_json; sleep 21600; done"]
    healthcheck:
      disable: true
    extra_hosts:
      - "carrental.test:host-gateway"
    environment:
      - GATEWAY_API_KEYS=${GATEWAY_API_KEYS}
      - DATABASE_URL=${DATABASE_URL}
      - LARAVEL_BASE_URL=${LARAVEL_BASE_URL}
      - LARAVEL_API_TOKEN=${LARAVEL_API_TOKEN}
      - GREENMOTION_API_URL=${GREENMOTION_API_URL}
      - GREENMOTION_USERNAME=${GREENMOTION_USERNAME}
      - GREENMOTION_PASSWORD=${GREENMOTION_PASSWORD}
      - USAVE_API_URL=${USAVE_API_URL}
      - USAVE_USERNAME=${USAVE_USERNAME}
      - USAVE_PASSWORD=${USAVE_PASSWORD}
      - RENTEON_API_URL=${RENTEON_API_URL}
      - RENTEON_USERNAME=${RENTEON_USERNAME}
      - RENTEON_PASSWORD=${RENTEON_PASSWORD}
      - RENTEON_ALLOWED_PROVIDERS=${RENTEON_ALLOWED_PROVIDERS}
      - FAVRICA_API_URL=${FAVRICA_API_URL}
      - FAVRICA_TOKEN=${FAVRICA_TOKEN}
      - FAVRICA_USERNAME=${FAVRICA_USERNAME}
      - FAVRICA_PASSWORD=${FAVRICA_PASSWORD}
      - XDRIVE_API_URL=${XDRIVE_API_URL}
      - XDRIVE_TOKEN=${XDRIVE_TOKEN}
      - XDRIVE_USERNAME=${XDRIVE_USERNAME}
      - XDRIVE_PASSWORD=${XDRIVE_PASSWORD}
      - ADOBE_API_URL=${ADOBE_API_URL}
      - ADOBE_USERNAME=${ADOBE_USERNAME}
      - ADOBE_PASSWORD=${ADOBE_PASSWORD}
      - OKMOBILITY_API_URL=${OKMOBILITY_API_URL}
      - OKMOBILITY_CUSTOMER_CODE=${OKMOBILITY_CUSTOMER_CODE}
      - OKMOBILITY_COMPANY_CODE=${OKMOBILITY_COMPANY_CODE}
      - LOCAUTO_API_URL=${LOCAUTO_API_URL}
      - LOCAUTO_USERNAME=${LOCAUTO_USERNAME}
      - LOCAUTO_PASSWORD=${LOCAUTO_PASSWORD}
      - WHEELSYS_API_URL=${WHEELSYS_API_URL}
      - WHEELSYS_ACCOUNT_NO=${WHEELSYS_ACCOUNT_NO}
      - WHEELSYS_LINK_CODE=${WHEELSYS_LINK_CODE}
      - WHEELSYS_AGENT_CODE=${WHEELSYS_AGENT_CODE}
      - SURPRICE_API_URL=${SURPRICE_API_URL}
      - SURPRICE_API_KEY=${SURPRICE_API_KEY}
      - SURPRICE_RATE_CODE=${SURPRICE_RATE_CODE}
      - SICILYBYCAR_API_URL=${SICILYBYCAR_API_URL}
      - SICILYBYCAR_ACCOUNT_CODE=${SICILYBYCAR_ACCOUNT_CODE}
      - SICILYBYCAR_API_KEY=${SICILYBYCAR_API_KEY}
      - RECORDGO_API_URL=${RECORDGO_API_URL}
      - RECORDGO_AUTH_URL=${RECORDGO_AUTH_URL}
      - RECORDGO_CLIENT_ID=${RECORDGO_CLIENT_ID}
      - RECORDGO_CLIENT_SECRET=${RECORDGO_CLIENT_SECRET}
      - RECORDGO_SUBSCRIPTION_KEY=${RECORDGO_SUBSCRIPTION_KEY}
      - RECORDGO_PARTNER_USER=${RECORDGO_PARTNER_USER}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
