# Locauto Rent — Rental Conditions (from LOCAUTO RENT CONDITIONS.xlsx)
# These are static T&Cs that don't come from the API.
# Displayed on booking extras page and booking details/voucher.

general:
  driving_license: "A valid driving license, held for a minimum of one year, is mandatory. For non-EU licenses, an International Driving Permit (IDP) is required. Digital licenses are not accepted."
  personal_documents: "At the time of rental, the Customer must show a valid ID card or passport. Digital documents are not accepted."
  payment_methods: "Credit Cards or Debit Cards are accepted for all car groups. The card must be in the main driver's name."
  mileage_policy: "Unlimited mileage for rentals of 1-27 days."
  fuel_policy: "Full to Full. The vehicle is provided with a full tank of fuel. It must be returned with a full tank. Refuelling surcharge: €35.00."
  cross_border: "Vehicles can be driven in all EU countries including Norway and Switzerland. Prior authorisation required."
  grace_period_pickup: "59 minutes from the booked pickup time. After that, the reservation may be cancelled."
  grace_period_dropoff: "59 minutes from the pickup time on the rental agreement."
  out_of_hours_fee: "€30.00 per rental (available on request, max 90 minutes after branch closing)."
  display_model: "We cannot guarantee a specific make and model. The vehicle category (SIPP code) is guaranteed."
  vat: "22%"
  airport_surcharge: "18%"
  railway_surcharge: "15%"

