services:
  gateway:
    build: .
    ports:
      - "8001:8000"
    extra_hosts:
      - "carrental.test:host-gateway"
    env_file:
      - .env
    environment:
      - GATEWAY_ENV=local
      - GATEWAY_DEBUG=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./data:/app/data
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: sh -lc "python -m app.scripts.bootstrap_hosts && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
